<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Dashboard</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; --green: #b2ff59; --red: #ff5252; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
        h2 { color: var(--green); margin: 0; font-size: 22px; }
        
        select { background: #333; color: white; border: 1px solid var(--green); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; outline: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 5px solid var(--green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h3 { margin: 0; font-size: 13px; color: #aaa; text-transform: uppercase; }
        .card .value { font-size: 24px; font-weight: bold; margin-top: 10px; }

        .table-container { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #2a2a2a; color: var(--green); padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-top: 1px solid #333; font-size: 14px; }
        tr:hover { background: #252525; }
        .profit-plus { color: var(--green); }
        .profit-minus { color: var(--red); }
    </style>
</head>
<body>

    <div class="header">
        <h2>Dashboard</h2>
        <div>
            <label style="margin-right: 10px;">Select month:</label>
            <select id="monthSelector" onchange="fetchData()">
                <option value="4/2026">April 2026</option>
                <option value="5/2026">May 2026</option>
                <option value="6/2026">June 2026</option>
                <option value="7/2026">July 2026</option>
                <option value="8/2026">August 2026</option>
                <option value="9/2026">September 2026</option>
                <option value="10/2026">October 2026</option>
                <option value="11/2026">November 2026</option>
                <option value="12/2026">December 2026</option>
            </select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card"><h3>Total Deposit</h3><div id="total-deposit" class="value">0</div></div>
        <div class="card"><h3>Total Withdraw</h3><div id="total-withdraw" class="value profit-minus">0</div></div>
        <div class="card"><h3>Net Profit</h3><div id="total-profit" class="value">0</div></div>
    </div>

    <div class="table-container" id="table-container">
        <p style="padding: 20px;">Data ရယူနေပါသည်...</p>
    </div>

    <script>
        const sheetId = '1q47nRgrw0mQYbNiimDKaTBWcuzYY9Q0X1Gyaf_x2UYU'; 

        // --- လအလိုက် GID နံပါတ်များ ထည့်ရန် နေရာ (ဒီမှာ ပြင်ပေးရုံပါပဲ) ---
        const gidMap = {
            "4/2026": "0",
            "5/2026": "693670032",
            "6/2026": "2122548177",
            "7/2026": "GID_HERE", // လအသစ်ရှိရင် ဒီမှာ GID ထည့်ပါ
            "8/2026": "GID_HERE",
            "9/2026": "GID_HERE",
            "10/2026": "GID_HERE",
            "11/2026": "GID_HERE",
            "12/2026": "GID_HERE"
        };

        function fetchData() {
            const selectedMonth = document.getElementById('monthSelector').value;
            const gid = gidMap[selectedMonth];

            // GID မရှိသေးလျှင်
            if (!gid || gid === "GID_HERE") {
                document.getElementById('table-container').innerHTML = "<p style='padding:20px; color:red;'>ဤလအတွက် GID မသတ်မှတ်ရသေးပါ။</p>";
                return;
            }

            const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

            fetch(base)
                .then(res => res.text())
                .then(data => {
                    const json = JSON.parse(data.substr(47).slice(0, -2));
                    const rows = json.table.rows;
                    
                    let totalDep = 0, totalWith = 0, totalProf = 0;
                    let tableHtml = '<table><thead><tr><th>Date</th><th>Streamer</th><th>Deposit</th><th>Withdraw</th><th>Win / Lose</th></tr></thead><tbody>';

                    rows.forEach((row, index) => {
                        const d = row.c;

                        // Header တန်း၊ Total အတန်း နှင့် နောက်ဆုံးအတန်းများကို ကျော်ရန်
                        if (!d || !d[0] || d[1]?.v === "Streamer" || (d[1] && d[1].v == "Total") || index === rows.length - 1) return;

                        const dep = (d[2] && d[2].v !== null) ? parseFloat(d[2].v) : 0;
                        const wit = (d[3] && d[3].v !== null) ? parseFloat(d[3].v) : 0;
                        const prof = (d[4] && d[4].v !== null) ? parseFloat(d[4].v) : 0;

                        totalDep += dep;
                        totalWith += wit;
                        totalProf += prof;

                        tableHtml += `<tr>
                            <td>${d[0].f || d[0].v}</td>
                            <td>${d[1] ? d[1].v : ''}</td>
                            <td>${dep.toLocaleString()}</td>
                            <td class="profit-minus">${wit.toLocaleString()}</td>
                            <td class="${prof >= 0 ? 'profit-plus' : 'profit-minus'}">${prof.toLocaleString()}</td>
                        </tr>`;
                    });

                    tableHtml += '</tbody></table>';
                    document.getElementById('table-container').innerHTML = tableHtml;
                    document.getElementById('total-deposit').innerText = totalDep.toLocaleString();
                    document.getElementById('total-withdraw').innerText = totalWith.toLocaleString();
                    document.getElementById('total-profit').innerText = totalProf.toLocaleString();
                    document.getElementById('total-profit').className = `value ${totalProf >= 0 ? 'profit-plus' : 'profit-minus'}`;
                });
        }

        fetchData();
    </script>
</body>
</html>
