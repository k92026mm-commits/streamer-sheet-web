<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Dashboard</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; --green: #b2ff59; --red: #ff5252; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .header h2 { color: var(--green); margin: 0; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 5px solid var(--green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h3 { margin: 0; font-size: 14px; color: #aaa; text-transform: uppercase; }
        .card .value { font-size: 24px; font-weight: bold; margin-top: 10px; }

        /* Table Style */
        .table-container { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #2a2a2a; color: var(--green); padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-top: 1px solid #333; font-size: 14px; }
        tr:hover { background: #252525; }
        .profit-plus { color: var(--green); }
        .profit-minus { color: var(--red); }
    </style>
</head>
<body>

    <div class="header">
        <h2>Dashboard</h2>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Deposit</h3>
            <div id="total-deposit" class="value">0</div>
        </div>
        <div class="card">
            <h3>Total Withdraw</h3>
            <div id="total-withdraw" class="value profit-minus">0</div>
        </div>
        <div class="card">
            <h3>Net Profit</h3>
            <div id="total-profit" class="value">0</div>
        </div>
    </div>

    <div class="header">
        <h2 style="font-size: 18px;">Daily Report Table</h2>
    </div>

    <div class="table-container" id="table-container">
        </div>

    <script>
        const sheetId = '1SP_zHdCnvGythGVXiBEJxSnTuU4qoKjSTIJXekaTUmo';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        fetch(base)
            .then(res => res.text())
            .then(data => {
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                let totalDep = 0, totalWith = 0, totalProf = 0;
                let tableHtml = '<table><thead><tr>';
                
                // Header (Date, Streamer, Deposit, Withdraw, Profit သာပြမည်)
                const headers = ['Date', 'Streamer', 'Deposit', 'Withdraw', 'Win / Lose'];
                headers.forEach(h => { tableHtml += `<th>${h}</th>`; });
                tableHtml += '</tr></thead><tbody>';

                rows.forEach(row => {
                    const d = row.c;
                    // d[0]=Date, d[1]=Streamer, d[2]=Deposit, d[3]=Withdraw, d[4]=Win/Lose
                    const dep = d[2] ? parseFloat(d[2].v) : 0;
                    const wit = d[3] ? parseFloat(d[3].v) : 0;
                    const prof = d[4] ? parseFloat(d[4].v) : 0;

                    totalDep += dep;
                    totalWith += wit;
                    totalProf += prof;

                    tableHtml += `<tr>
                        <td>${d[0] ? d[0].f || d[0].v : ''}</td>
                        <td>${d[1] ? d[1].v : ''}</td>
                        <td>${dep.toLocaleString()}</td>
                        <td class="profit-minus">${wit.toLocaleString()}</td>
                        <td class="${prof >= 0 ? 'profit-plus' : 'profit-minus'}">${prof.toLocaleString()}</td>
                    </tr>`;
                });

                tableHtml += '</tbody></table>';
                document.getElementById('table-container').innerHTML = tableHtml;
                
                // Update Cards
                document.getElementById('total-deposit').innerText = totalDep.toLocaleString();
                document.getElementById('total-withdraw').innerText = totalWith.toLocaleString();
                document.getElementById('total-profit').innerText = totalProf.toLocaleString();
                document.getElementById('total-profit').className = `value ${totalProf >= 0 ? 'profit-plus' : 'profit-minus'}`;
            });
    </script>
</body>
</html>
